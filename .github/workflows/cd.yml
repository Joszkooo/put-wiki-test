name: CD

on: workflow_dispatch

permissions:
  contents: write
  packages: write

jobs:
  detect-changes:
    runs-on: ubuntu-latest

    outputs:
      client: ${{ steps.filter.outputs.client }}
      server: ${{ steps.filter.outputs.server }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            client:
              - 'client/**'
            server:
              - 'server/**'

  set-version:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.client == 'true' || needs.detect-changes.outputs.server == 'true'
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create tag
        id: tag
        uses: anothrNick/github-tag-action@v1
        env:
          tag_prefix: v
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-client:
    runs-on: ubuntu-latest

    needs: 
      - detect-changes
      - set-version

    if: needs.detect-changes.outputs.client == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: setup QEMU
        uses: docker/setup-qemu-action@v4.0.0
      
      - name: setup Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Build and push client image
        uses: docker/build-push-action@v7.2.0
        with:
          context: ./client
          push: true
          tags: client:${{ needs.set-version.steps.tag.outputs.tag }}

  build-server:
    runs-on: ubuntu-latest

    needs: 
      - detect-changes
      - set-version

    if: needs.detect-changes.outputs.server == 'true'  

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Login to GHCR
        uses: docker/login-action@v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: setup QEMU
        uses: docker/setup-qemu-action@v4.0.0
      
      - name: setup Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name : Build and push server image
        uses: docker/build-push-action@v7.2.0
        with:
          context: ./server
          push: true
          tags: /server:${{ needs.set-version.steps.tag.outputs.tag }}

  release:
    runs-on: ubuntu-latest

    needs:
      - detect-changes
      - set-version
      - build-client
      - build-server

    if: always() && (needs.detect-changes.outputs.client == 'true' || needs.detect-changes.outputs.server == 'true')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.set-version.steps.tag.outputs.tag }}
          name: Release ${{ needs.set-version.steps.tag.outputs.tag }}